<style>
/* ============================================================
   RESET & FOUNDATION
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }


:root {
  --abyss:       #060810;
  --deep:        #0a0c18;
  --trench:      #0d1020;
  --surface:     #141830;
  --purple:      #7e5eff;
  --purple-dim:  #5a3dc7;
  --cyan:        #00f0ff;
  --cyan-dim:    #0a8f99;
  --red:         #ff3d5a;
  --red-dim:     #99243a;
  --bio-green:   #00ff88;
  --gold:        #ffd700;
  --white:       #e8eaf0;
  --gray:        #6b7394;
  --gray-dim:    #3a3f5c;
  --font-display: 'Orbitron', monospace;
  --font-body:    'Rajdhani', sans-serif;
  --font-mono:    'Space Mono', monospace;
}


html {
  scroll-behavior: smooth;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: var(--purple-dim) var(--abyss);
}


body {
  background: var(--abyss);
  color: var(--white);
  font-family: var(--font-body);
  overflow-x: hidden;
  cursor: none;
}


::selection {
  background: var(--purple);
  color: var(--abyss);
}


::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--abyss); }
